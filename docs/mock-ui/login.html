<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - FLAE Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00C27A',
                        accent: '#B9FF3B',
                        'dark-green': '#062E24',
                        background: '#F3FBF7',
                        surface: '#FFFFFF',
                        muted: '#D1EAE0'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(6, 46, 36, 0.05)',
                        'glow': '0 0 10px rgba(185, 255, 59, 0.4)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-4 antialiased text-dark-green relative overflow-hidden">
    
    <!-- Decorative Background Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-accent/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Login Container -->
    <div class="w-full max-w-md bg-white/90 backdrop-blur-md rounded-2xl shadow-soft p-8 border border-muted/50 relative z-10">
        <!-- Logo / Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 bg-background border border-muted rounded-2xl flex items-center justify-center mb-5 shadow-sm">
                <i data-lucide="bot-message-square" class="text-primary w-8 h-8"></i>
            </div>
            <h1 class="font-heading text-2xl font-bold tracking-tight text-dark-green mb-1.5">Chào mừng trở lại</h1>
            <p class="text-dark-green/60 text-sm">Đăng nhập vào FLAE Agent của bạn</p>
        </div>

        <!-- Form -->
        <form class="space-y-5">
            <!-- Email -->
            <div class="space-y-2">
                <label for="email" class="block text-sm font-medium text-dark-green/90">Email doanh nghiệp</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i data-lucide="mail" class="w-5 h-5 text-dark-green/40"></i>
                    </div>
                    <input type="email" id="email" 
                        class="block w-full pl-11 pr-3 py-2.5 bg-white border border-muted rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors placeholder:text-dark-green/30 text-dark-green" 
                        placeholder="admin@company.com" required>
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label for="password" class="block text-sm font-medium text-dark-green/90">Mật khẩu</label>
                    <a href="#" class="text-xs font-medium text-primary hover:text-primary/80 transition-colors">Quên mật khẩu?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-dark-green/40"></i>
                    </div>
                    <input type="password" id="password" 
                        class="block w-full pl-11 pr-11 py-2.5 bg-white border border-muted rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors placeholder:text-dark-green/30 text-dark-green" 
                        placeholder="••••••••" required>
                    <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-dark-green/40 hover:text-dark-green/80 transition-colors cursor-pointer focus:outline-none">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Options -->
            <div class="flex items-center justify-between pt-1 pb-1">
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 rounded border-muted text-primary focus:ring-primary/20 accent-primary cursor-pointer transition-colors">
                    <label for="remember-me" class="ml-2.5 block text-sm text-dark-green/70 cursor-pointer select-none">
                        Ghi nhớ thiết bị
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-[0_4px_14px_rgba(0,194,122,0.2)] text-sm font-semibold text-white bg-primary hover:bg-[#00B06F] hover:shadow-[0_4px_14px_rgba(0,194,122,0.3)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 cursor-pointer">
                Đăng nhập
                <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="mt-7 mb-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-muted/70"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-3 bg-white text-dark-green/50 text-xs font-medium uppercase tracking-wider">Hoặc đăng nhập bằng</span>
                </div>
            </div>
        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-3">
            <button type="button" class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-muted rounded-xl bg-white text-sm font-medium text-dark-green/80 hover:bg-background hover:border-muted transition-all duration-200 cursor-pointer shadow-sm">
                <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
            <button type="button" class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-muted rounded-xl bg-white text-sm font-medium text-dark-green/80 hover:bg-background hover:border-muted transition-all duration-200 cursor-pointer shadow-sm">
                <svg class="w-4 h-4 mr-2 text-[#1877F2]" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </button>
        </div>
    </div>
    
    <!-- Footer -->
    <p class="mt-8 text-center text-xs text-dark-green/50 max-w-xs relative z-10">
        Bằng việc đăng nhập, bạn đồng ý với <br> <a href="#" class="underline hover:text-primary transition-colors">Điều khoản dịch vụ</a> và <a href="#" class="underline hover:text-primary transition-colors">Chính sách bảo mật</a>
    </p>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
